<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Configurar MFA - Security Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0e1117 0%, #1a1d29 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #1e2139;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      padding: 48px;
      max-width: 520px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      color: #ffffff;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #8b92a7;
      font-size: 14px;
      line-height: 1.6;
    }

    .qr-section {
      text-align: center;
      margin: 32px 0;
      padding: 24px;
      background: #2a2e45;
      border-radius: 12px;
      border: 2px solid #3a3f5c;
    }

    #qr {
      width: 220px;
      height: 220px;
      border: 10px solid #ffffff;
      border-radius: 14px;
      display: block;
      margin: 0 auto;
    }

    .qr-label {
      color: #8b92a7;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #e1e4ea;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #2a2e45;
      border: 2px solid #3a3f5c;
      border-radius: 8px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 4px;
      text-align: center;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #5b7cff;
      background: #33384f;
    }

    input::placeholder {
      color: #6b7280;
      letter-spacing: normal;
    }

    .mfa-info {
      background: #1e3a8a;
      border-left: 4px solid #3b82f6;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #dbeafe;
      line-height: 1.6;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #5b7cff 0%, #4c63d9 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 24px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(91, 124, 255, 0.4);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #4a5568;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-success {
      background: #065f46;
      color: #d1fae5;
      border-left: 4px solid #10b981;
    }

    .alert-error {
      background: #7f1d1d;
      color: #fee2e2;
      border-left: 4px solid #ef4444;
    }

    .alert-info {
      background: #1e3a8a;
      color: #dbeafe;
      border-left: 4px solid #3b82f6;
    }

    .alert-warning {
      background: #78350f;
      color: #fef3c7;
      border-left: 4px solid #f59e0b;
    }

    .msg {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      color: #8b92a7;
      text-align: center;
    }

    .debug-info {
      background: #1a1d29;
      border: 1px solid #3a3f5c;
      border-radius: 8px;
      padding: 12px;
      margin-top: 20px;
      font-size: 11px;
      color: #8b92a7;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
    }

    .debug-info div {
      margin: 4px 0;
    }

    .hidden {
      display: none;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #5b7cff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">🔐</div>
      <h1>Ativar MFA</h1>
      <p class="subtitle">Escaneie o QR Code com o Google Authenticator ou Microsoft Authenticator</p>
    </div>

    <div id="alert-container"></div>

    <div class="qr-section">
      <img id="qr" alt="QR Code MFA" />
      <div class="qr-label">
        Não consegue escanear?<br/>
        Insira manualmente o código no seu app de autenticação
      </div>
    </div>

    <form id="mfa-form">
      <div class="form-group">
        <label for="code">Código de 6 dígitos</label>
        <input 
          id="code" 
          type="text"
          maxlength="6" 
          placeholder="000000" 
          inputmode="numeric"
          pattern="[0-9]{6}"
          autocomplete="off"
        />
        <div class="mfa-info">
          Digite o código de 6 dígitos gerado no Google Authenticator
        </div>
      </div>

      <button type="submit" class="btn" id="btn">Validar MFA</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="back-link">
      <a href="/login">← Voltar para Login</a>
    </div>

    <!-- Debug Info -->
    <div class="debug-info hidden" id="debug-info">
      <div><strong>Debug:</strong></div>
      <div id="debug-content"></div>
    </div>
  </div>

  <script>
    const API_URL = '';
    const qrImg = document.getElementById('qr');
    const codeInput = document.getElementById('code');
    const btnValidate = document.getElementById('btn');
    const msg = document.getElementById('msg');
    const mfaForm = document.getElementById('mfa-form');
    const alertContainer = document.getElementById('alert-container');
    const debugInfo = document.getElementById('debug-info');
    const debugContent = document.getElementById('debug-content');

    // ============================================================
    // FUNÇÕES AUXILIARES
    // ============================================================

    function addDebug(message) {
      console.log('🔍 DEBUG:', message);
      debugContent.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
      debugInfo.classList.remove('hidden');
    }

    function showAlert(message, type = 'info') {
      clearAlerts();
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      alertContainer.appendChild(alert);
    }

    function clearAlerts() {
      alertContainer.innerHTML = '';
    }

    // ============================================================
    // INICIALIZAÇÃO - Carregar QR Code
    // ============================================================

    async function initMfaSetup() {
      console.log("🔐 [MFA Setup] Iniciando...");
      addDebug('[MFA Setup] Iniciando configuração de MFA');

      // Tentar obter email de várias fontes
      const email = localStorage.getItem('user_email') || 
                    sessionStorage.getItem('user_email') ||
                    localStorage.getItem('scanner_user');

      if (!email) {
        console.error("❌ Email não encontrado");
        addDebug('❌ Email não encontrado em nenhuma fonte');
        showAlert('❌ Email não encontrado. Faça login novamente.', 'error');
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
        return;
      }

      console.log("👤 Email encontrado:", email);
      addDebug(`👤 Email recuperado: ${email}`);

      try {
        // ✅ Requisição para gerar QR Code
        console.log("📡 Solicitando QR Code...");
        addDebug('📡 Enviando requisição para /auth/mfa/setup');
        
        const res = await fetch(`${API_URL}/auth/mfa/setup`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ email }),
          credentials: 'include'
        });

        const statusCode = res.status;
        console.log(`📊 Resposta: ${statusCode}`);
        addDebug(`📊 Status HTTP: ${statusCode}`);

        if (!res.ok) {
          const errData = await res.json().catch(() => ({detail: 'Erro desconhecido'}));
          console.error("❌ Erro ao gerar QR:", errData);
          addDebug(`❌ Erro na geração do QR: ${errData.detail}`);
          
          showAlert(`❌ Erro: ${errData.detail || "Erro ao gerar QR Code"}`, 'error');
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
          return;
        }

        const data = await res.json();
        console.log("✅ QR Code recebido");
        addDebug('✅ Resposta do servidor recebida com sucesso');

        // ✅ Armazenar QR Code
        if (data.qr_code) {
          localStorage.setItem('mfa_qr', data.qr_code);
          qrImg.src = data.qr_code;
          console.log("✅ QR Code exibido");
          addDebug('✅ QR Code exibido na página');
        }

        // ✅ Armazenar secret (opcional, para recuperação)
        if (data.secret) {
          localStorage.setItem('mfa_secret', data.secret);
          console.log("✅ Secret armazenado");
          addDebug('✅ Secret de backup armazenado');
        }

        // ✅ Armazenar email para usar na validação
        localStorage.setItem('mfa_email', email);
        sessionStorage.setItem('mfa_email', email);
        console.log("✅ Setup pronto para validação");
        addDebug('✅ Setup pronto - aguardando validação do código');

      } catch (error) {
        console.error("❌ Erro na requisição:", error);
        addDebug(`❌ Exceção ao gerar QR: ${error.message}`);
        showAlert('❌ Erro ao conectar com o servidor.', 'error');
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
      }
    }

    // ============================================================
    // VALIDAÇÃO DO CÓDIGO MFA
    // ============================================================

    mfaForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      await validateMFA();
    });

    async function validateMFA() {
      const code = codeInput.value.trim();
      const email = localStorage.getItem('mfa_email') || 
                    localStorage.getItem('user_email') ||
                    sessionStorage.getItem('user_email');

      console.log("🔑 [Validar MFA] Iniciando validação...");
      addDebug('[Validar MFA] Iniciando validação de código');
      console.log("📧 Email:", email);
      console.log("🔢 Código:", code.length === 6 ? "✅ Válido" : "❌ Inválido");

      // Validar comprimento do código
      if (code.length !== 6 || !/^\d{6}$/.test(code)) {
        msg.textContent = "❌ Digite um código válido de 6 dígitos.";
        msg.style.color = '#fee2e2';
        console.warn("⚠️ Código inválido:", code);
        addDebug(`⚠️ Código inválido: ${code.length} dígitos`);
        return;
      }

      if (!email) {
        msg.textContent = "❌ Email não encontrado. Volte para login.";
        msg.style.color = '#fee2e2';
        console.error("❌ Email não encontrado");
        addDebug('❌ Email não encontrado durante validação');
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
        return;
      }

      try {
        btnValidate.disabled = true;
        btnValidate.innerHTML = '<span class="loading"></span>Validando...';
        msg.textContent = "⏳ Validando código...";
        msg.style.color = '#dbeafe';
        clearAlerts();

        console.log("📡 Enviando validação para /auth/mfa/verify...");
        addDebug(`📡 Enviando validação para ${API_URL}/auth/mfa/verify`);

        // ✅ Requisição de validação
        const res = await fetch(`${API_URL}/auth/mfa/verify`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ email, code }),
          credentials: 'include'
        });

        const statusCode = res.status;
        console.log(`📊 Resposta: ${statusCode}`);
        addDebug(`📊 Status HTTP: ${statusCode}`);

        if (!res.ok) {
          const errData = await res.json().catch(() => ({detail: 'Erro desconhecido'}));
          console.error("❌ Validação falhou:", errData);
          addDebug(`❌ Validação falhou: ${errData.detail}`);
          
          msg.textContent = `❌ ${errData.detail || "Código inválido ou expirado. Tente novamente."}`;
          msg.style.color = '#fee2e2';
          showAlert(msg.textContent, 'error');
          
          btnValidate.disabled = false;
          btnValidate.innerHTML = 'Validar MFA';
          
          return;
        }

        const data = await res.json();
        console.log("✅ MFA validado com sucesso!");
        addDebug('✅ MFA validado com sucesso!');

        // ✅ IMPORTANTE: Armazenar o novo token se fornecido
        if (data.token) {
          console.log("🔑 Novo token recebido:", data.token.substring(0, 30) + "...");
          addDebug(`🔑 Token recebido: ${data.token.substring(0, 30)}...`);
          
          localStorage.setItem('scanner_token', data.token);
          localStorage.setItem('token', data.token);
          localStorage.setItem('auth_token', data.token);
          sessionStorage.setItem('scanner_token', data.token);
          sessionStorage.setItem('token', data.token);
          
          console.log("✅ Token armazenado");
          addDebug('✅ Tokens armazenados em localStorage e sessionStorage');
        }

        // ✅ Limpar dados temporários
        localStorage.removeItem('mfa_qr');
        localStorage.removeItem('mfa_secret');
        localStorage.removeItem('temp_token');
        localStorage.removeItem('mfa_email');
        sessionStorage.removeItem('temp_token');
        sessionStorage.removeItem('mfa_email');

        msg.textContent = "✅ MFA ativado com sucesso! Redirecionando...";
        msg.style.color = '#d1fae5';
        showAlert('✅ MFA ativado com sucesso!', 'success');
        console.log("🚀 Redirecionando para dashboard...");
        addDebug('🚀 Redirecionando para /dashboard');

        // Redirecionar após 1.5 segundos
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1500);

      } catch (error) {
        console.error("❌ Exceção ao validar MFA:", error);
        addDebug(`❌ Exceção: ${error.message}`);
        msg.textContent = "❌ Erro ao conectar com o servidor.";
        msg.style.color = '#fee2e2';
        showAlert(msg.textContent, 'error');
        btnValidate.disabled = false;
        btnValidate.innerHTML = 'Validar MFA';
      }
    }

    // ============================================================
    // INICIALIZAR AO CARREGAR A PÁGINA
    // ============================================================

    window.addEventListener('load', () => {
      console.log("📄 [window.load] Página carregada");
      addDebug('[window.load] Página carregada, iniciando MFA setup');
      initMfaSetup();
    });

    // ============================================================
    // PERMITIR ENTER PARA VALIDAR
    // ============================================================

    codeInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        validateMFA();
      }
    });

    // ============================================================
    // AUTO-FOCUS NO INPUT
    // ============================================================

    window.addEventListener('load', () => {
      setTimeout(() => {
        codeInput.focus();
      }, 500);
    });

  </script>
</body>
</html>

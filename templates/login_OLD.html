<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Security Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0e1117 0%, #1a1d29 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1e2139;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 48px;
            max-width: 440px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #8b92a7;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #e1e4ea;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2e45;
            border: 2px solid #3a3f5c;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #5b7cff;
            background: #33384f;
        }

        input::placeholder {
            color: #6b7280;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5b7cff 0%, #4c63d9 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(91, 124, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #4a5568;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-form {
            text-align: center;
            margin-top: 24px;
            color: #8b92a7;
            font-size: 14px;
        }

        .toggle-form a {
            color: #5b7cff;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #065f46;
            color: #d1fae5;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #7f1d1d;
            color: #fee2e2;
            border-left: 4px solid #ef4444;
        }

        .alert-info {
            background: #1e3a8a;
            color: #dbeafe;
            border-left: 4px solid #3b82f6;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mfa-info {
            background: #1e3a8a;
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #dbeafe;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <h1 id="form-title">Login</h1>
            <p class="subtitle">Security Multicloud Storage Scanner</p>
        </div>

        <div id="alert-container"></div>

        <!-- Login Form -->
        <form id="login-form" class="hidden">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>

            <div class="form-group hidden" id="mfa-group">
                <label for="login-mfa">Código MFA (6 dígitos)</label>
                <input type="text" id="login-mfa" placeholder="123456" maxlength="6" pattern="[0-9]{6}">
                <div class="mfa-info">
                    Digite o código de 6 dígitos do Google Authenticator
                </div>
            </div>

            <button type="submit" class="btn" id="login-btn">
                Entrar
            </button>

            <div class="toggle-form">
                Não tem uma conta? <a href="#" id="show-register">Criar Conta</a>
            </div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden">
            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="register-name">Nome Completo</label>
                <input type="text" id="register-name" placeholder="Seu Nome" required>
            </div>

            <div class="form-group">
                <label for="register-password">Senha</label>
                <input type="password" id="register-password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn" id="register-btn">
                Criar Conta
            </button>

            <div class="toggle-form">
                Já tem uma conta? <a href="#" id="show-login">Fazer Login</a>
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Elements
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const formTitle = document.getElementById('form-title');
        const alertContainer = document.getElementById('alert-container');
        const mfaGroup = document.getElementById('mfa-group');
        const showRegisterLink = document.getElementById('show-register');
        const showLoginLink = document.getElementById('show-login');

        // Show login form by default
        loginForm.classList.remove('hidden');

        // Toggle between login and register
        showRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            formTitle.textContent = 'Criar Conta';
            clearAlerts();
        });

        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            formTitle.textContent = 'Login';
            clearAlerts();
        });

        // Alert functions
        function showAlert(message, type = 'info') {
            clearAlerts();
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);
        }

        function clearAlerts() {
            alertContainer.innerHTML = '';
        }

        // Check if user needs MFA
        async function checkMFAStatus(email) {
            try {
                const response = await fetch(`${API_URL}/auth/mfa/status?email=${encodeURIComponent(email)}`);
                const data = await response.json();
                return data.mfa_enabled || false;
            } catch (error) {
                console.error('Error checking MFA status:', error);
                return false;
            }
        }

        // Login Form Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const mfaCode = document.getElementById('login-mfa').value;
            const loginBtn = document.getElementById('login-btn');

            // Check if MFA is required
            const mfaRequired = await checkMFAStatus(email);
            
            if (mfaRequired && !mfaCode) {
                mfaGroup.classList.remove('hidden');
                showAlert('Digite o código MFA do Google Authenticator', 'info');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span>Entrando...';
            clearAlerts();

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        mfa_code: mfaCode || null
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // ✅ SALVAR TOKEN NO LOCALSTORAGE
                    localStorage.setItem('scanner_token', data.token);
                    localStorage.setItem('scanner_user', JSON.stringify({
                        email: data.email,
                        full_name: data.full_name,
                        mfa_enabled: data.mfa_enabled
                    }));

                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    // ✅ REDIRECIONAR PARA DASHBOARD
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    if (data.detail === 'MFA code required') {
                        mfaGroup.classList.remove('hidden');
                        showAlert('Digite o código MFA do Google Authenticator', 'info');
                    } else {
                        showAlert(data.detail || 'Erro ao fazer login', 'error');
                    }
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Entrar';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Erro de conexão com o servidor', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Entrar';
            }
        });

        // Register Form Submit
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('register-email').value;
            const fullName = document.getElementById('register-name').value;
            const password = document.getElementById('register-password').value;
            const registerBtn = document.getElementById('register-btn');

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading"></span>Criando conta...';
            clearAlerts();

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        full_name: fullName,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Conta criada com sucesso! Faça login.', 'success');
                    
                    // Switch to login form
                    setTimeout(() => {
                        registerForm.classList.add('hidden');
                        loginForm.classList.remove('hidden');
                        formTitle.textContent = 'Login';
                        document.getElementById('login-email').value = email;
                        clearAlerts();
                    }, 2000);
                } else {
                    showAlert(data.detail || 'Erro ao criar conta', 'error');
                }
            } catch (error) {
                console.error('Register error:', error);
                showAlert('Erro de conexão com o servidor', 'error');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Criar Conta';
            }
        });

        // Auto-focus on email field
        document.getElementById('login-email').focus();
    </script>
</body>
</html>
